services:
  postgres:
    image: postgres:16
    container_name: mindbody_db
    environment:
      POSTGRES_DB: mindbody_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '55432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: mindbody_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mindbody.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '8082:80'
    depends_on:
      - postgres

volumes:
  pgdata:
