spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/mindbody_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  jwt:
    secret: ${JWT_SECRET:mindbody-local-secret-key-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
